abstraction_notes: >
  This benchmark isolates the exact-input `debtToken -> XT` pricing/state-update
  path of `TermMaxOrderV2`. The model now keeps the Solidity helper stack
  structurally visible (`calcIntervalProps`, `cutsReverseIter`, `_buyXtStep`,
  `_buyToken`, `_buyXt`, `_swapAndUpdateReserves`) while freezing the curve to a
  single active lend-side cut passed as direct parameters. The remaining
  fidelity gap is that `CurveCut[]` is still an array of structs, which the
  current Verity macro path cannot represent as a storage dynamic array, and the
  Solidity function-pointer parameters of `_buyToken` / `_swapAndUpdateReserves`
  are specialized to the concrete `_buyXtStep` / `_buyXt` path. Token
  transfers, callbacks, pool/GT rebalancing, and event emission are omitted
  because they do not affect `virtualXtReserve`.
unsupported_feature_codes:
  - array_of_struct_param_unsupported
  - higher_order_function_param_specialized
notes: >
  TermMax range-order AMM slice for pricing-state transition correctness. The
  proof target is the highest-signal easy theorem in this family: on the
  successful single-segment `debtToken -> XT` exact-input path, the stored
  `virtualXtReserve` decreases by exactly the XT amount implied by the curve.
