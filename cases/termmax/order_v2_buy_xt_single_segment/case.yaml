abstraction_notes: >
  This benchmark isolates the exact-input `debtToken -> XT` pricing/state-update
  path of `TermMaxOrderV2`. The model keeps the Solidity helper stack
  structurally visible (`calcIntervalProps`, `cutsReverseIter`, `_buyXtStep`,
  `_buyToken`, `_buyXt`, `_swapAndUpdateReserves`), with each storage read
  happening in the same caller as in the Solidity source. The curve cut offset
  is now carried as a native `Int256` parameter, and `MathLib.plusInt256` is
  inlined as the same `if (b < 0) ... else ...` shape Solidity uses. Solidity
  custom errors (`UnexpectedAmount`, `InsufficientLiquidity`, `XtReserveTooHigh`)
  are mirrored as named Verity errors, and the entry function carries the
  `nonreentrant(nonReentrancyLock)` modifier. Remaining DSL gaps: `CurveCut[]`
  cannot exist as a parameter or storage field (Verity#1003/#1745 — nested
  arrays / storage struct arrays), and Solidity function-pointer parameters of
  `_buyToken` / `_swapAndUpdateReserves` cannot be passed in Verity, so they
  are specialized to the concrete `_buyXtStep` / `_buyXt` path. Token
  transfers, callbacks, pool/GT rebalancing, deadline/sameToken/onlyOpen
  modifiers, and event emission are omitted because they do not affect
  `virtualXtReserve` (and reentry is blocked by the `nonreentrant` modifier).
unsupported_feature_codes:
