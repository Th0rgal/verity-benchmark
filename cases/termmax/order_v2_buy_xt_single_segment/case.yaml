abstraction_notes: >
  This benchmark isolates the exact-input `debtToken -> XT` pricing/state-update
  path of `TermMaxOrderV2`. The model keeps the `_buyXtStep`, `_buyToken`, and
  `_swapAndUpdateReserves` arithmetic and reserve write, but freezes the curve to
  a single active lend-side cut passed as direct parameters. That simplification
  is forced by the current Verity surface: `CurveCut[]` is an array of structs,
  while the dynamic-array lowering only supports single-word elements, and
  executable `verity_contract` bodies still reject internal helper-call binds
  like `let b ← helper a`. Token transfers, callbacks, pool/GT rebalancing, and
  event emission are omitted because they do not affect `virtualXtReserve`.
unsupported_feature_codes:
  - array_of_struct_param_unsupported
  - internal_helper_bind_unsupported
notes: >
  TermMax range-order AMM slice for pricing-state transition correctness. The
  proof target is the highest-signal easy theorem in this family: on the
  successful single-segment `debtToken -> XT` exact-input path, the stored
  `virtualXtReserve` decreases by exactly the XT amount implied by the curve.
