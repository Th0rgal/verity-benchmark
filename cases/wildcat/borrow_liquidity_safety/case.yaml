abstraction_notes: >
  The benchmark keeps the Wildcat V2 successful borrow path, the
  `MarketState.liquidityRequired` arithmetic, and the final transfer/write
  sequence. `_getUpdatedState()` is compressed to a precomputed protocol-fee
  delta applied before the borrow check, while the pending-withdrawal and
  unclaimed-withdrawal fields are treated as already current borrow-check
  inputs. Hooks, sanctions, and ERC20 balance reads/transfers remain explicit
  trusted boundaries.
unsupported_feature_codes: []
notes: >
  Wildcat V2 borrow safety slice proving that a successful positive borrow
  cannot pull market assets below the liquidity requirement computed from the
  updated state used by the borrow guard. The required liquidity includes the
  reserve-ratio-backed portion of non-pending supply, 100% of pending
  withdrawals, 100% of normalized unclaimed withdrawals, and updated accrued
  protocol fees.
