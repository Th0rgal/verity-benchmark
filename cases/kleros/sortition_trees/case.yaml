abstraction_notes: >
  The benchmark specializes the dynamic K-ary sortition tree to a balanced
  binary tree with eight leaves (three levels). It preserves multi-level
  parent-update propagation and draw-interval traversal logic while
  abstracting dynamic arrays, bytes32 stake-path packing, and the hash used
  to derive the draw ticket. Compared to the previous four-leaf version,
  this exercises intermediate-node propagation and deeper draw traversal.
  A removeLeaf function is also modeled.
