abstraction_notes: >
  The benchmark targets the compact peg-out quote lifecycle in PegOutContract:
  depositPegOut registers the Rootstock-side quote amount and user-refund expiry
  fields. refundPegOut settles the quote to the LP or fallback balance, and
  refundUserPegOut settles an expired quote to the user refund recipient or
  fallback balance while recording the external collateral slash call amount as
  separate penalty accounting. Refund recipient identity is modeled explicitly:
  depositPegOut stores the LP and user refund addresses, and the settlement
  proofs read those stored fields instead of taking recipient identity as a
  theorem assumption.
  Cryptographic quote validation, Bitcoin transaction parsing, and bridge
  confirmation checks are modeled as success preconditions because they gate the
  lifecycle but do not change the conserved Rootstock-side amount after a quote
  is accepted. Deposit overpayment refund behavior and the LP penalty timing
  predicate are modeled explicitly.
