abstraction_notes: >
  The benchmark isolates the linked list insertion logic of addOwnerWithThreshold
  in the Safe OwnerManager. The threshold update is elided as it does not affect
  the owners mapping. Only the inListReachable invariant from the Certora
  OwnerReach.spec is modeled, proving that addOwner preserves reachability
  from the SENTINEL node for all nodes with non-zero successors.
unsupported_feature_codes: []
notes: >
  Linked list reachability invariant preservation for the Safe OwnerManager.
  Based on the Certora OwnerReach.spec which defines the inListReachable
  invariant over a ghost mapping tracking the owners linked list.
  The proof uses explicit witness chains and chain lifting to show that
  pre-state reachability implies post-state reachability after insertion.
