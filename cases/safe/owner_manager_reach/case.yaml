abstraction_notes: >
  The benchmark models all four ownership-mutating functions of the Safe
  OwnerManager: addOwnerWithThreshold, removeOwner, swapOwner, and
  setupOwners. Threshold management is elided as it does not affect the
  owners mapping. Three families of invariants are specified:
  inListReachable (forward reachability from SENTINEL), ownerListInvariant
  (combined inListReachable + reachableInList biconditional), and acyclicity
  (no cycles in the linked list). setupOwners serves as the base case.
unsupported_feature_codes: []
notes: >
  Linked list reachability invariant preservation for the Safe OwnerManager.
  Based on the Certora OwnerReach.spec which defines the inListReachable
  and reachableInList invariants. The addOwner inListReachable proof is
  complete; the remaining theorem statements are scaffolded for future proof
  work and exposed as editable benchmark tasks.
