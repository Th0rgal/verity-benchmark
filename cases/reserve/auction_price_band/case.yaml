abstraction_notes: >
  The benchmark freezes the per-pair auction price band that
  RebalancingLib._price exposes. The interior exponential decay (PRBMath
  ln + exp) is preserved structurally in the model with two opaque
  axioms: `MathLib.exp` and `MathLib.ln`. The proof uses one algebraic
  axiom on `exp` (`exp_nonpositive_le_d18`). The storage-mapping reads
  on `auction.prices[token]` and `rebalance.details[token].inRebalance`
  are taken as parameter inputs (NexusMutual RammSpotPrice precedent);
  the Solidity require gate is encoded as a precondition on the pure
  function rather than as a `Verity.require` call.
